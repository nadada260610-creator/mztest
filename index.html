<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>커리어 부캐 테스트 - 나의 직장 캐릭터 찾기</title>
    <meta name="description" content="여성 직장인 커리어 성향 진단 테스트. 나의 업무 강점과 찰떡인 리더십 스타일은?">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="background-effects">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <main id="app-root" class="glass-panel">
            <!-- Start Screen -->
            <section id="start-screen" class="screen active">
                <div class="hero-content">
                    <div class="badge">Career Test</div>
                    <h1 class="main-title">내 안에 숨겨진<br><span class="highlight">커리어 부캐</span>는?</h1>
                    <p class="subtitle">여성 직장인을 위한 심층 성향 분석 테스트.<br>나의 강점, 리더십 스타일, 그리고 찰떡 파트너를 알아보세요.</p>
                </div>
                <div class="hero-graphic">
                    <img src="images/character_enfp.png" alt="ENFP" class="hero-char char-1">
                    <img src="images/character_intj.png" alt="INTJ" class="hero-char char-2">
                    <img src="images/character_esfp.png" alt="ESFP" class="hero-char char-3">
                    <img src="images/character_isfj.png" alt="ISFJ" class="hero-char char-4">
                    <img src="images/character_entj.png" alt="ENTJ" class="hero-char char-5">
                </div>
                <button id="start-btn" class="primary-btn">
                    <span>테스트 시작하기</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </section>

            <!-- Question Screen -->
            <section id="question-screen" class="screen hidden">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div id="progress-text" class="progress-text">1 / 10</div>
                </div>
                
                <div class="question-container">
                    <div id="question-badge" class="q-badge">Q1</div>
                    <h2 id="question-title" class="q-title">질문 내용</h2>
                    <div class="options-container">
                        <button class="option-btn" data-value="A" id="option-a">
                            <span class="option-text">옵션 A</span>
                        </button>
                        <button class="option-btn" data-value="B" id="option-b">
                            <span class="option-text">옵션 B</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Loading Screen -->
            <section id="loading-screen" class="screen hidden">
                <div class="loader-container">
                    <div class="spinner"></div>
                    <div class="loader-text">
                        <h3 id="loading-title">커리어 데이터 분석 중...</h3>
                        <p id="loading-subtitle">나의 업무 무기를 도출하고 있어요</p>
                    </div>
                </div>
            </section>

            <!-- Result Screen -->
            <section id="result-screen" class="screen hidden">
                <div class="result-header">
                    <div class="result-character">
                        <img id="result-character-img" src="" alt="MBTI Character">
                    </div>
                    <span class="result-badge" id="mbti-type">MBTI</span>
                    <h1 class="result-title" id="result-title">결과 타이틀</h1>
                </div>

                <div class="result-card">
                    <div class="card-section weapon-section">
                        <div class="section-title"><i class="fa-solid fa-bolt"></i> 핵심 업무 무기</div>
                        <p class="weapon-desc" id="result-weapon">무기 설명</p>
                    </div>
                    
                    <div class="card-section">
                        <div class="section-title"><i class="fa-solid fa-star"></i> 당신의 커리어 스타일은?</div>
                        <ul class="style-list" id="result-desc-list">
                            <!-- 리스트 주입 -->
                        </ul>
                    </div>

                    <div class="chemistry-section">
                        <div class="chem-box good">
                            <span class="chem-label">환상의 찰떡 케미</span>
                            <strong class="chem-type" id="chem-good-type">ENTJ</strong>
                            <span class="chem-title" id="chem-good-title">제너럴 CEO</span>
                        </div>
                        <div class="chem-box bad">
                            <span class="chem-label">파국의 상극 케미</span>
                            <strong class="chem-type" id="chem-bad-type">ISFP</strong>
                            <span class="chem-title" id="chem-bad-title">비주얼리스트</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="share-btn" class="secondary-btn">
                        <i class="fa-solid fa-link"></i> 링크 복사하기
                    </button>
                    <button id="retry-btn" class="ghost-btn">
                        <i class="fa-solid fa-rotate-right"></i> 다시 테스트하기
                    </button>
                </div>
                
                <div id="toast-msg" class="toast hidden">링크가 복사되었습니다!</div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
