<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>커리어 부캐 테스트 - 나의 직장 캐릭터 찾기</title>
    <meta name="description" content="여성 직장인 커리어 성향 진단 테스트. 나의 업무 강점과 찰떡인 리더십 스타일은?">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="background-effects">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <main id="app-root" class="glass-panel">
            <!-- Start Screen -->
            <section id="start-screen" class="screen active">
                <div class="hero-content">
                    <div class="start-header-wrapper">
                        <div class="start-text">
                            <h1 class="title">여성 커리어 성향<br><span style="color:var(--primary);">MBTI 진단 테스트</span></h1>
                            <p class="subtitle">여성 직장인을 위한 심층 성향 분석 테스트.<br>나의 강점, 리더십 스타일, 그리고 찰떡 파트너를 알아보세요.</p>
                        </div>
                        <div class="hero-graphic">
                            <img src="images/character_enfj.png" alt="ENFJ" class="hero-char" style="animation-delay: -0.1s">
                            <img src="images/character_enfp.png" alt="ENFP" class="hero-char" style="animation-delay: -0.2s">
                            <img src="images/character_entj.png" alt="ENTJ" class="hero-char" style="animation-delay: -0.3s">
                            <img src="images/character_entp.png" alt="ENTP" class="hero-char" style="animation-delay: -0.4s">
                            <img src="images/character_esfj.png" alt="ESFJ" class="hero-char" style="animation-delay: -0.5s">
                            <img src="images/character_esfp.png" alt="ESFP" class="hero-char" style="animation-delay: -0.6s">
                            <img src="images/character_estj.png" alt="ESTJ" class="hero-char" style="animation-delay: -0.7s">
                            <img src="images/character_estp.png" alt="ESTP" class="hero-char" style="animation-delay: -0.8s">
                            <img src="images/character_infj.png" alt="INFJ" class="hero-char" style="animation-delay: -0.9s">
                            <img src="images/character_infp.png" alt="INFP" class="hero-char" style="animation-delay: -1.0s">
                            <img src="images/character_intj.png" alt="INTJ" class="hero-char" style="animation-delay: -1.1s">
                            <img src="images/character_intp.png" alt="INTP" class="hero-char" style="animation-delay: -1.2s">
                            <img src="images/character_isfj.png" alt="ISFJ" class="hero-char" style="animation-delay: -1.3s">
                            <img src="images/character_isfp.png" alt="ISFP" class="hero-char" style="animation-delay: -1.4s">
                            <img src="images/character_istj.png" alt="ISTJ" class="hero-char" style="animation-delay: -1.5s">
                            <img src="images/character_istp.png" alt="ISTP" class="hero-char" style="animation-delay: -1.6s">
                        </div>
                    </div>
                    <button id="start-btn" class="primary-btn">
                        <span>테스트 시작하기</span>
                        <span class="btn-icon">→</span>
                    </button>
                </div>
            </section>

            <!-- Question Screen -->
            <section id="question-screen" class="screen hidden">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div id="progress-text" class="progress-text">1 / 10</div>
                </div>
                
                <div class="question-container">
                    <div id="question-badge" class="q-badge">Q1</div>
                    <h2 id="question-title" class="q-title">질문 내용</h2>
                    <div class="options-container">
                        <button class="option-btn" id="option-a">
                            <span class="opt-label">A</span>
                            <span class="opt-text" id="opt-a-text"></span>
                        </button>
                        
                        <button class="option-btn" id="option-b">
                            <span class="opt-label">B</span>
                            <span class="opt-text" id="opt-b-text"></span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Loading Screen -->
            <section id="loading-screen" class="screen hidden">
                <div class="loader-container">
                    <div class="spinner"></div>
                    <div class="loader-text">
                        <h3 id="loading-title">커리어 데이터 분석 중...</h3>
                        <p id="loading-subtitle">나의 업무 무기를 도출하고 있어요</p>
                    </div>
                </div>
            </section>

            <!-- Result Screen -->
            <section id="result-screen" class="screen hidden">
                <div class="result-layout">
                    <div class="result-left">
                        <div class="result-header">
                            <div class="mbti-badge" id="mbti-type">ESTJ</div>
                            <h2 class="result-title" id="result-title">단호한 커리어 설계자</h2>
                        </div>
                        
                        <div class="character-display">
                            <img id="result-character-img" src="" alt="Result Character">
                        </div>
                    </div>

                    <div class="result-right">
                        <div class="result-card">
                            <h3>⚔️ 나의 핵심 무기</h3>
                            <p id="result-weapon">철저한 데이터 분석력과 장기적 로드맵 구축 능력</p>
                        </div>
                        
                        <div class="result-card">
                            <h3>🎯 직장 내 특징</h3>
                            <ul id="result-desc-list" class="feature-list">
                                <!-- JS injected -->
                            </ul>
                        </div>
                        
                        <div class="chemistry">
                            <div class="chem-card good">
                                <div class="chem-icon">💖 찰떡 파트너</div>
                                <div class="chem-type" id="chem-good-type">ENTP</div>
                                <div class="chem-title" id="chem-good-title">게임 체인저</div>
                            </div>
                            <div class="chem-card bad">
                                <div class="chem-icon">⚡ 주의 파트너</div>
                                <div class="chem-type" id="chem-bad-type">ESFJ</div>
                                <div class="chem-title" id="chem-bad-title">네트워킹의 중심</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="retry-btn" class="ghost-btn">
                        <i class="fa-solid fa-rotate-right"></i> 다시 테스트하기
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
